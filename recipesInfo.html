<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzon Web recipes Info</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }


        #recipesDetails {
            background-color: #121619;
            min-height: 100vh;
            padding: 80px 20px;
        }

        @font-face {
            font-family: Quentin;
            src: url(fontes/Quentin.ttf);
        }

        @font-face {
            font-family: Bungee;
            src: url(fontes/Bungee-Regular.ttf);
        }

        .details-box {
            color: #fff;
            padding: 20px;
        }

        .details-box h2 {
            font-family: Bungee;
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #FD9D3E;
        }

        .details-box p {
            font-size: 1rem;
            margin-bottom: 10px;
            line-height: 1.6;
            color: #ccc;
        }

        .image-box {
            text-align: center;
        }

        .image-box img {
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            box-shadow: 0px 15px 40px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 768px) {

            .details-box h2 {
                font-size: 1.8rem;
                text-align: center;
            }

            .details-box p {
                font-size: 0.9rem;
                text-align: center;
            }

            .image-box img {
                max-width: 300px;
            }

        }


        .image-box img:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }

        .row {
            min-height: 80vh;
        }
    </style>
</head>

<body>


    <div id="recipesDetails">

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="app.js"></script>
    <script>

        let recipesDetails = document.getElementById("recipesDetails");
        let index = localStorage.getItem("recipesIndex");
        let recipe = recipes[index];

        recipesDetails.innerHTML = `
    <div class="container-fluid">
    
        <div class="row justify-content-center align-items-center g-5">
    
        
             <div class="col-lg-6 col-md-12 col-sm-12 order-2 order-lg-1">
                 <div class="details-box">
                     <h2>${recipe.name}</h2>
                     <p><strong>Price:</strong> ${recipe.price}</p>
                     <p><strong>Ingredients:</strong> ${recipe.ingredients.join(", ")}</p>
                     <p><strong>Instructions:</strong> ${recipe.instructions.join("<br>")}</p>
                     <p><strong>Difficulty:</strong> ${recipe.difficulty}</p>
                     <p><strong>Cuisine:</strong> ${recipe.cuisine}</p>
                     <p><strong>Calories:</strong> ${recipe.caloriesPerServing}</p>
                     <p><strong>Rating:</strong> ${recipe.rating}</p>
                 </div>
             </div>
         
             
             <div class="col-lg-6 col-md-12 col-sm-12 order-1 order-lg-2">
                 <div class="image-box">
                     <img src="${recipe.image}" alt="">
                 </div>
             </div>
    
        </div>
    
       
    </div>
    `

    </script>

</body>

</html>
